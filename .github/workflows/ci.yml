name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format
        run: cargo fmt --all -- --check

  check:
    name: clippy · test · build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # A macOS-only failure should not hide the Linux result, or vice versa.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    env:
      # Isolated XDG so tests never touch the runner's real state. (Do NOT
      # override HOME — rustup's toolchain lives under $HOME/.rustup, and
      # pointing HOME elsewhere hides it: "no default toolchain configured".)
      #
      # macOS has no XDG_RUNTIME_DIR of its own; vmux falls back to
      # /tmp/vmux-$uid there, but setting it keeps both runners on the same
      # paths, so a test that leaks state fails the same way on each.
      # Literal paths, NOT ${{ runner.temp }}: the `runner` context is not
      # available in job-level `env:`, and using it there makes GitHub reject the
      # whole workflow at load time — which is why every CI run before this
      # commit was a startup failure that ran zero jobs. Runners are ephemeral,
      # so a fixed /tmp path isolates the tests just as well.
      XDG_RUNTIME_DIR: /tmp/vmux-xdg-runtime
      XDG_CONFIG_HOME: /tmp/vmux-xdg-config
      XDG_STATE_HOME: /tmp/vmux-xdg-state
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # `--locked` everywhere: without it CI silently resolves newer semver-compatible
      # deps than the ones the release job publishes with, so an upstream break
      # surfaces at release time instead of on the PR that introduced it.
      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      # Surface failing test names as a job annotation. A bare `cargo test` puts
      # them only in the log, which means opening the run to learn anything at all.
      - name: Test
        run: |
          set -o pipefail
          if ! cargo test --all-targets --locked 2>&1 | tee test.log; then
            echo "::error::failing tests: $(sed -n '/^failures:$/,/^test result/p' test.log \
              | grep -E '^    [a-z_]+' | tr -d ' ' | paste -sd, -)"
            sed -n '/^---- /,/^test result/p' test.log | head -60
            exit 1
          fi

      # `--exact` matches the *full* test path, so the truncated name silently
      # selected 0 tests and passed green. Keep the path complete, and make the
      # step fail loudly if the filter ever stops matching again.
      - name: Restart persistence e2e
        run: |
          cargo test --all-targets \
            daemon::tests::e2e_restart_preserves_scrollback_across_save_reload \
            -- --exact --nocapture 2>&1 | tee e2e.log
          grep -q '^test result: ok. 1 passed' e2e.log \
            || { echo "::error::persistence e2e selected no tests"; exit 1; }

      - name: Release build
        run: cargo build --release --locked

  msrv:
    name: msrv 1.87
    runs-on: ubuntu-latest
    env:
      # Keep in sync with `rust-version` in Cargo.toml, which the README also
      # advertises. CI otherwise runs on `stable`, so nothing caught a newer
      # API sneaking in and breaking the MSRV we promise.
      MSRV: "1.87"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.MSRV }}
      - uses: Swatinem/rust-cache@v2
      - name: Check against the advertised MSRV
        run: cargo check --all-targets --locked

  audit:
    name: security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      # Fails the build on an actual advisory. Unmaintained/unsound *warnings*
      # (currently 4, all in transitive deps of portable-pty) are reported but
      # do not fail: they are not actionable from here, and a job that is red by
      # default is a job people learn to ignore. Dependabot tracks the upgrades.
      - name: Audit dependencies
        run: cargo audit
